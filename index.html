<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Soccer Match Timer</title>

<style>

body{
    margin:0;
    background:transparent;
    overflow:hidden;
    font-family:"Arial Black",sans-serif;
}

#timerBox{

    position:absolute;
    top:100px;
    left:100px;

    background:#111111CC;

    border:2px solid white;
    border-radius:12px;

    color:white;

    padding:12px 18px;

    display:flex;
    align-items:center;
    gap:12px;

    cursor:move;

    user-select:none;
    touch-action:none;

    transform-origin:center center;

    box-shadow:
    0 0 10px rgba(255,255,255,.25),
    inset 0 0 12px rgba(255,255,255,.18);

    backdrop-filter:blur(3px);
}

#ball{
    font-size:30px;
}

#period{

    font-size:28px;
    min-width:60px;
    text-align:center;

    color:#FFD700;

    text-shadow:
    0 0 8px rgba(255,215,0,.8);

}

#time{

    font-size:42px;
    letter-spacing:2px;

    text-shadow:
    0 0 8px rgba(255,255,255,.4);
}

#controls{

    position:absolute;

    top:100%;
    left:0;

    margin-top:10px;

    display:flex;
    flex-wrap:wrap;
    gap:6px;

}

button{

    background:#1f1f1f;
    color:white;

    border:1px solid white;

    border-radius:8px;

    padding:8px 12px;

    font-weight:bold;
}

button:active{
    transform:scale(.95);
}

.hidden{
    display:none !important;
}

</style>
</head>
<body>

<div id="timerBox">

    <div id="ball">⚽</div>

    <div id="period">前半</div>

    <div id="time">00:00:00</div>

    <div id="controls">

        <button id="startBtn">START</button>
        <button id="stopBtn">STOP</button>
        <button id="resetBtn">RESET</button>

        <button onclick="setPeriod('前半')">前半</button>
        <button onclick="setPeriod('後半')">後半</button>
        <button onclick="setPeriod('PK')">PK</button>

    </div>

</div>

<script>

const STORAGE_KEY="soccerTimerData";

let running=false;

let elapsed=0;

let startPerf=0;

let scale=1;

let period="前半";

const timerEl=document.getElementById("time");
const periodEl=document.getElementById("period");
const controls=document.getElementById("controls");

function saveState(){

    localStorage.setItem(STORAGE_KEY,JSON.stringify({

        running,
        elapsed,

        wallClock:Date.now(),

        period,
        scale,

        x:timerBox.offsetLeft,
        y:timerBox.offsetTop

    }));
}

function loadState(){

    const data=JSON.parse(
        localStorage.getItem(STORAGE_KEY)||"null"
    );

    if(!data) return;

    elapsed=data.elapsed||0;

    period=data.period||"前半";

    scale=data.scale||1;

    timerBox.style.transform=
    `scale(${scale})`;

    if(data.x!=null)
        timerBox.style.left=data.x+"px";

    if(data.y!=null)
        timerBox.style.top=data.y+"px";

    if(data.running){

        const diff=
        Date.now()-data.wallClock;

        elapsed+=diff;

        startPerf=performance.now();

        running=true;
    }

    updateDisplay();
}

function setPeriod(v){

    period=v;

    periodEl.textContent=v;

    saveState();
}

function format(ms){

    let sec=Math.floor(ms/1000);

    let h=Math.floor(sec/3600);

    sec%=3600;

    let m=Math.floor(sec/60);

    let s=sec%60;

    return (
        String(h).padStart(2,"0")
        +":"
        +String(m).padStart(2,"0")
        +":"
        +String(s).padStart(2,"0")
    );
}

function currentElapsed(){

    if(!running)
        return elapsed;

    return elapsed+
    (performance.now()-startPerf);
}

function updateDisplay(){

    timerEl.textContent=
    format(currentElapsed());

    periodEl.textContent=
    period;
}

function loop(){

    updateDisplay();

    requestAnimationFrame(loop);
}

document.getElementById("startBtn")
.onclick=()=>{

    if(running) return;

    startPerf=
    performance.now();

    running=true;

    saveState();
};

document.getElementById("stopBtn")
.onclick=()=>{

    if(!running) return;

    elapsed=
    currentElapsed();

    running=false;

    saveState();
};

document.getElementById("resetBtn")
.onclick=()=>{

    running=false;

    elapsed=0;

    updateDisplay();

    saveState();
};

setInterval(saveState,1000);

loadState();

loop();

const timerBox=
document.getElementById("timerBox");

let dragging=false;

let offsetX=0;
let offsetY=0;

timerBox.addEventListener("pointerdown",(e)=>{

    if(e.target.tagName==="BUTTON")
        return;

    dragging=true;

    offsetX=e.clientX-
    timerBox.offsetLeft;

    offsetY=e.clientY-
    timerBox.offsetTop;
});

window.addEventListener("pointermove",(e)=>{

    if(!dragging) return;

    timerBox.style.left=
    (e.clientX-offsetX)+"px";

    timerBox.style.top=
    (e.clientY-offsetY)+"px";
});

window.addEventListener("pointerup",()=>{

    dragging=false;

    saveState();
});

let pinchStart=null;
let baseScale=1;

timerBox.addEventListener("touchstart",(e)=>{

    if(e.touches.length===2){

        pinchStart=Math.hypot(

            e.touches[0].clientX-
            e.touches[1].clientX,

            e.touches[0].clientY-
            e.touches[1].clientY
        );

        baseScale=scale;
    }
});

timerBox.addEventListener("touchmove",(e)=>{

    if(e.touches.length!==2)
        return;

    e.preventDefault();

    const dist=Math.hypot(

        e.touches[0].clientX-
        e.touches[1].clientX,

        e.touches[0].clientY-
        e.touches[1].clientY
    );

    scale=
    Math.max(
        0.5,
        Math.min(
            4,
            baseScale*
            (dist/pinchStart)
        )
    );

    timerBox.style.transform=
    `scale(${scale})`;

    saveState();

},{passive:false});

let tapTimer;

timerBox.addEventListener("click",(e)=>{

    if(e.target.tagName==="BUTTON")
        return;

    clearTimeout(tapTimer);

    tapTimer=setTimeout(()=>{

        controls.classList.toggle("hidden");

    },120);
});

</script>

</body>
</html>
