<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport"
content="width=device-width,initial-scale=1,user-scalable=no">

<title>Soccer Broadcast Overlay</title>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

#overlay{

    position:absolute;

    top:10px;
    left:50%;

    transform:
    translateX(-50%)
    scale(1);

    transform-origin:center center;

    display:flex;
    flex-direction:column;
    align-items:center;

    user-select:none;
    touch-action:none;
}

#scoreboard{

    display:flex;
    align-items:center;

    height:48px;

    border-radius:8px;

    overflow:hidden;

    box-shadow:
    0 2px 8px rgba(0,0,0,.4);

    font-weight:700;
}

.team{

    display:flex;
    align-items:center;

    height:48px;

    padding:0 10px;

    color:#fff;
}

.home{
    background:#003e7e;
}

.away{
    background:#8a0000;
}

.team img{

    width:28px;
    height:28px;

    border-radius:50%;
    margin-right:6px;

    object-fit:cover;
}

.teamName{
    font-size:13px;
    white-space:nowrap;
}

.score{

    width:78px;
    height:48px;

    background:#111;

    color:#fff;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:24px;
}

.timerBox{

    height:48px;
    background:#000;

    color:#fff;

    display:flex;
    align-items:center;

    padding:0 12px;
}

#timer{
    font-size:18px;
}

#period{
    margin-left:8px;
    font-size:14px;
    color:#ffd700;
}

.panel{

    margin-top:8px;

    background:rgba(20,20,20,.95);

    padding:10px;

    border-radius:8px;

    display:none;

    width:620px;
}

button{

    font-size:18px;
    font-weight:bold;

    padding:12px 18px;
    margin:4px;

    border:none;
    border-radius:6px;
}

input{
    font-size:18px;
    padding:8px;
    margin:4px;
}

.file{
    font-size:16px;
}

</style>
</head>

<body>

<div id="overlay">

<div id="scoreboard">

<div class="team home">

<img id="homeLogo">

<div id="homeName"
class="teamName">
HOME
</div>

</div>

<div class="score">

<span id="homeScore">0</span>
-
<span id="awayScore">0</span>

</div>

<div class="team away">

<img id="awayLogo">

<div id="awayName"
class="teamName">
AWAY
</div>

</div>

<div class="timerBox">

<div id="timer">
00:00:00
</div>

<div id="period">
前半
</div>

</div>

</div>

<!-- PANEL1 -->

<div id="panel1" class="panel">

<button onclick="startTimer()">START</button>

<button onclick="stopTimer()">STOP</button>

<button onclick="resetTimer()">RESET</button>

<button onclick="setPeriod('前半')">前半</button>

<button onclick="setPeriod('後半')">後半</button>

<button onclick="setPeriod('PK')">PK</button>

</div>

<!-- PANEL2 -->

<div id="panel2" class="panel">

<div>

HOME

<input id="homeInput"
placeholder="チーム名">

<input
type="file"
id="homeFile"
class="file"
accept="image/*">

</div>

<div>

AWAY

<input id="awayInput"
placeholder="チーム名">

<input
type="file"
id="awayFile"
class="file"
accept="image/*">

</div>

</div>

</div>

<script>

/* =====================
SAVE
===================== */

function save(){

localStorage.setItem(
"soccerOverlay",
JSON.stringify(state)
);

}

function load(){

const d=
localStorage.getItem(
"soccerOverlay"
);

if(d){

Object.assign(
state,
JSON.parse(d)
);

}

}

/* =====================
STATE
===================== */

const state={

elapsed:0,

running:false,

period:"前半",

startPerformance:0

};

load();

/* =====================
TIMER
===================== */

function startTimer(){

if(state.running) return;

state.running=true;

state.startPerformance=
performance.now()-
state.elapsed;

save();

}

function stopTimer(){

if(!state.running) return;

state.elapsed=
performance.now()-
state.startPerformance;

state.running=false;

save();

}

function resetTimer(){

state.elapsed=0;

state.running=false;

updateTimer();

save();

}

function setPeriod(v){

state.period=v;

period.textContent=v;

save();

}

function updateTimer(){

let elapsed=
state.elapsed;

if(state.running){

elapsed=
performance.now()
-
state.startPerformance;

}

let total=
Math.floor(elapsed/1000);

let h=
String(
Math.floor(total/3600)
).padStart(2,"0");

let m=
String(
Math.floor(total%3600/60)
).padStart(2,"0");

let s=
String(
total%60
).padStart(2,"0");

timer.textContent=
`${h}:${m}:${s}`;

period.textContent=
state.period;

requestAnimationFrame(
updateTimer
);

}

updateTimer();

/* =====================
SINGLE TAP
===================== */

const overlay=
document.getElementById(
"scoreboard"
);

let clickTimer;

overlay.addEventListener(
"click",
()=>{

clearTimeout(clickTimer);

clickTimer=
setTimeout(()=>{

panel1.style.display=
panel1.style.display==="block"
?
"none"
:
"block";

},250);

}
);

/* =====================
DOUBLE TAP
===================== */

overlay.addEventListener(
"dblclick",
()=>{

panel2.style.display=
panel2.style.display==="block"
?
"none"
:
"block";

}
);

/* =====================
TEAM NAME
===================== */

homeInput.oninput=()=>{

homeName.textContent=
homeInput.value;

};

awayInput.oninput=()=>{

awayName.textContent=
awayInput.value;

};

/* =====================
LOGO
===================== */

function loadLogo(
fileInput,
target
){

fileInput.addEventListener(
"change",
e=>{

const file=
e.target.files[0];

if(!file) return;

const reader=
new FileReader();

reader.onload=()=>{

target.src=
reader.result;

};

reader.readAsDataURL(file);

});

}

loadLogo(
homeFile,
homeLogo
);

loadLogo(
awayFile,
awayLogo
);

/* =====================
DRAG
===================== */

let dragging=false;

let startX=0;
let startY=0;

overlay.parentElement
.addEventListener(
"pointerdown",
e=>{

dragging=true;

startX=
e.clientX-
overlay.parentElement.offsetLeft;

startY=
e.clientY-
overlay.parentElement.offsetTop;

}
);

document.addEventListener(
"pointermove",
e=>{

if(!dragging) return;

overlay.parentElement.style.left=
(e.clientX-startX)+"px";

overlay.parentElement.style.top=
(e.clientY-startY)+"px";

}
);

document.addEventListener(
"pointerup",
()=>dragging=false
);

/* =====================
PINCH ZOOM
===================== */

let scale=1;

let startDistance=0;

document.addEventListener(
"touchmove",
e=>{

if(
e.touches.length===2
){

let dx=
e.touches[0].clientX-
e.touches[1].clientX;

let dy=
e.touches[0].clientY-
e.touches[1].clientY;

let dist=
Math.sqrt(
dx*dx+dy*dy
);

if(startDistance){

scale*=
dist/startDistance;

scale=
Math.max(
0.6,
Math.min(
2.0,
scale
)
);

document
.getElementById(
"overlay"
)
.style.transform=
`translateX(-50%) scale(${scale})`;

}

startDistance=dist;

}

},
{passive:true}
);

document.addEventListener(
"touchend",
()=>{

startDistance=0;

}
);

</script>

</body>
</html>
