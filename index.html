<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Soccer Match Timer</title>

<style>

body{
    margin:0;
    background:transparent;
    overflow:hidden;
    font-family:"Arial Black",sans-serif;
}

#timerBox{

    position:absolute;

    background:#111111CC;

    border:2px solid #fff;
    border-radius:12px;

    color:#fff;

    padding:12px 18px;

    display:flex;
    align-items:center;
    gap:12px;

    user-select:none;
    touch-action:none;

    transform-origin:center center;

    box-shadow:
    0 0 6px rgba(255,255,255,.15);

    will-change:transform;
}

#ball{
    font-size:30px;
}

#period{

    font-size:28px;
    min-width:60px;

    text-align:center;

    color:#FFD700;

    text-shadow:
    0 0 4px rgba(255,215,0,.5);
}

#time{

    font-size:42px;

    letter-spacing:2px;

    text-shadow:
    0 0 3px rgba(255,255,255,.3);
}

#controls{

    position:absolute;

    top:100%;
    left:0;

    margin-top:10px;

    display:flex;

    flex-wrap:wrap;

    gap:6px;
}

button{

    background:#1f1f1f;

    color:white;

    border:1px solid white;

    border-radius:8px;

    padding:8px 12px;

    font-weight:bold;
}

button:active{
    transform:scale(.95);
}

.hidden{
    display:none !important;
}

</style>

</head>
<body>

<div id="timerBox">

```
<div id="ball">⚽</div>

<div id="period">前半</div>

<div id="time">00:00:00</div>

<div id="controls">

    <button id="startBtn">START</button>
    <button id="stopBtn">STOP</button>
    <button id="resetBtn">RESET</button>

    <button onclick="setPeriod('前半')">前半</button>
    <button onclick="setPeriod('後半')">後半</button>
    <button onclick="setPeriod('PK')">PK</button>

</div>
```

</div>

<script>

const STORAGE_KEY="soccerTimerData";

const timerBox=document.getElementById("timerBox");
const timerEl=document.getElementById("time");
const periodEl=document.getElementById("period");
const controls=document.getElementById("controls");

let running=false;
let elapsed=0;
let startPerf=0;

let period="前半";

let scale=1;

let posX=100;
let posY=100;

let lastDisplay="";

function applyTransform(){

    timerBox.style.transform=
    `translate3d(${posX}px,${posY}px,0) scale(${scale})`;
}

function currentElapsed(){

    if(!running) return elapsed;

    return elapsed+
    (performance.now()-startPerf);
}

function saveState(){

    localStorage.setItem(
        STORAGE_KEY,

        JSON.stringify({

            running,

            elapsed:
            currentElapsed(),

            wallClock:
            Date.now(),

            period,

            scale,

            posX,
            posY
        })
    );
}

function loadState(){

    const data=
    JSON.parse(
        localStorage.getItem(STORAGE_KEY)||"null"
    );

    if(!data) {

        applyTransform();

        return;
    }

    elapsed=data.elapsed||0;

    period=data.period||"前半";

    scale=data.scale||1;

    posX=data.posX||100;

    posY=data.posY||100;

    if(data.running){

        elapsed+=
        Date.now()-data.wallClock;

        startPerf=
        performance.now();

        running=true;
    }

    applyTransform();

    updateDisplay();
}

function setPeriod(v){

    period=v;

    updateDisplay();

    saveState();
}

function updateDisplay(){

    const ms=
    currentElapsed();

    let sec=
    Math.floor(ms/1000);

    let h=
    Math.floor(sec/3600);

    sec%=3600;

    let m=
    Math.floor(sec/60);

    let s=
    sec%60;

    const text=

    String(h).padStart(2,"0")
    +":"
    +String(m).padStart(2,"0")
    +":"
    +String(s).padStart(2,"0");

    if(text!==lastDisplay){

        lastDisplay=text;

        timerEl.textContent=text;
    }

    periodEl.textContent=period;
}

document
.getElementById("startBtn")
.onclick=()=>{

    if(running) return;

    startPerf=
    performance.now();

    running=true;

    saveState();
};

document
.getElementById("stopBtn")
.onclick=()=>{

    if(!running) return;

    elapsed=
    currentElapsed();

    running=false;

    saveState();

    updateDisplay();
};

document
.getElementById("resetBtn")
.onclick=()=>{

    running=false;

    elapsed=0;

    updateDisplay();

    saveState();
};

setInterval(
updateDisplay,
1000
);

let dragging=false;

let dragOffsetX=0;
let dragOffsetY=0;

timerBox.addEventListener(

"pointerdown",

e=>{

    if(e.target.tagName==="BUTTON")
        return;

    dragging=true;

    dragOffsetX=
    e.clientX-posX;

    dragOffsetY=
    e.clientY-posY;
});

window.addEventListener(

"pointermove",

e=>{

    if(!dragging)
        return;

    posX=
    e.clientX-dragOffsetX;

    posY=
    e.clientY-dragOffsetY;

    applyTransform();

},

{passive:true}
);

window.addEventListener(

"pointerup",

()=>{

    if(!dragging)
        return;

    dragging=false;

    saveState();
});

let pinchStart=0;
let baseScale=1;

timerBox.addEventListener(

"touchstart",

e=>{

    if(e.touches.length!==2)
        return;

    pinchStart=
    Math.hypot(

        e.touches[0].clientX-
        e.touches[1].clientX,

        e.touches[0].clientY-
        e.touches[1].clientY
    );

    baseScale=scale;
},

{passive:true}
);

timerBox.addEventListener(

"touchmove",

e=>{

    if(e.touches.length!==2)
        return;

    e.preventDefault();

    const dist=
    Math.hypot(

        e.touches[0].clientX-
        e.touches[1].clientX,

        e.touches[0].clientY-
        e.touches[1].clientY
    );

    scale=

    Math.max(
        0.5,

        Math.min(
            4,

            baseScale*
            (dist/pinchStart)
        )
    );

    applyTransform();

},

{passive:false}
);

timerBox.addEventListener(

"touchend",

()=>{

    saveState();
});

timerBox.addEventListener(

"click",

e=>{

    if(
        e.target.tagName==="BUTTON"
    ) return;

    controls.classList.toggle(
        "hidden"
    );
});

loadState();

updateDisplay();

</script>

</body>
</html>
