<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FIFA World Cup Style Soccer Timer</title>
    <style>
        :root {
            --bg-color: rgba(17, 17, 17, 0.8); /* #111111CC */
            --border-color: #ffffff;
            --text-color: #ffffff;
            --accent-color: #f3a913; /* ワールドカップをイメージしたゴールド */
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: transparent;
            font-family: 'Arial Black', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        /* タイマーコンテナ（ドラッグ＆ピンチ対象） */
        #timer-container {
            position: absolute;
            top: 20px;
            left: 20px;
            display: inline-flex;
            align-items: center;
            background: linear-gradient(135deg, #111111 0%, #2a2a2a 50%, #111111 100%); /* メタリック調放送局風 */
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 10px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5), inset 0 0 8px rgba(255,255,255,0.2);
            transform-origin: top left;
            transform: translate3d(0px, 0px, 0) scale(1);
            cursor: move;
            touch-action: none; /* ブラウザ標準のスクロールやピンチを無効化 */
        }

        /* サッカーボールアイコン */
        .icon {
            font-size: 1.2em;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: spin 20s linear infinite paused;
        }
        .running .icon {
            animation-play-state: running;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* ステータス（前半/後半/PK） */
        #status-display {
            color: var(--accent-color);
            font-size: 1.2em;
            margin-right: 15px;
            letter-spacing: 1px;
            text-shadow: 0 0 4px rgba(243,169,19,0.6);
        }

        /* 時間表示 */
        #time-display {
            color: var(--text-color);
            font-size: 1.5em;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* コントロールパネル */
        #control-panel {
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 8px;
            display: flex;
            gap: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: opacity 0.2s ease;
            z-index: 10000;
        }

        .hidden {
            display: none !important;
        }

        /* 操作ボタン */
        button {
            font-family: sans-serif;
            font-weight: bold;
            font-size: 12px;
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: white;
            background: #333;
            transition: background 0.1s;
        }

        button:active {
            transform: scale(0.95);
        }

        #btn-start { background-color: #27ae60; }
        #btn-stop { background-color: #c0392b; }
        #btn-reset { background-color: #7f8c8d; }
        .btn-period { background-color: #2980b9; }
    </style>
</head>
<body>

    <div id="timer-container">
        <div class="icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="11" fill="#fff" stroke="#000" stroke-width="1"/>
                <path d="M12 2L14.5 6.5H9.5L12 2Z" fill="#000"/>
                <path d="M12 22L14.5 17.5H9.5L12 22Z" fill="#000"/>
                <path d="M2 12L6.5 9.5V14.5L2 12Z" fill="#000"/>
                <path d="M22 12L17.5 9.5V14.5L22 12Z" fill="#000"/>
                <polygon points="12,9 14.5,11 13.5,14 10.5,14 9.5,11" fill="#000"/>
                <path d="M9.5 6.5L10.5 9M14.5 6.5L13.5 9M6.5 9.5L9.5 11M6.5 14.5L10.5 14M22 9.5L14.5 11M17.5 14.5L13.5 14M9.5 17.5L10.5 14M14.5 17.5L13.5 14" stroke="#000" stroke-width="1"/>
            </svg>
        </div>
        
        <div id="status-display">前半</div>
        
        <div id="time-display">00:00:00</div>

        <div id="control-panel" class="hidden">
            <button id="btn-start">スタート</button>
            <button id="btn-stop">ストップ</button>
            <button id="btn-reset">リセット</button>
            <button class="btn-period" onclick="setPeriod('前半')">前半</button>
            <button class="btn-period" onclick="setPeriod('後半')">後半</button>
            <button class="btn-period" onclick="setPeriod('PK')">PK</button>
        </div>
    </div>

    <script>
        // --- 状態管理オブジェクト ---
        const state = {
            isRunning: false,
            startTime: 0,      // 最後にスタートした「ブラウザ基準の現在時刻(ms)」
            elapsedTime: 0,    // それまでに蓄積された経過時間(ms)
            period: '前半',
            posX: 20,
            posY: 20,
            scale: 1
        };

        const container = document.getElementById('timer-container');
        const timeDisplay = document.getElementById('time-display');
        const statusDisplay = document.getElementById('status-display');
        const controlPanel = document.getElementById('control-panel');

        // --- 高精度タイマーコアロジック ---
        let animationFrameId = null;

        function updateTimer() {
            if (!state.isRunning) return;

            // デバイスの不可に左右されない高精度なパフォーマンスカウンターから逆算
            const now = performance.now();
            const totalElapsed = state.elapsedTime + (now - state.startTime);
            
            displayTime(totalElapsed);
            animationFrameId = requestAnimationFrame(updateTimer);
        }

        function displayTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const hrs = Math.floor(totalSeconds / 3600);
            const mins = Math.floor((totalSeconds % 3600) / 60);
            const secs = totalSeconds % 60;

            timeDisplay.textContent = 
                String(hrs).padStart(2, '0') + ':' +
                String(mins).padStart(2, '0') + ':' +
                String(secs).padStart(2, '0');
        }

        // --- 操作系関数 ---
        function startTimer() {
            if (state.isRunning) return;
            state.isRunning = true;
            // スタートした瞬間の高精度時間をデバイス内から取得
            state.startTime = performance.now();
            container.classList.add('running');
            updateTimer();
            saveState();
        }

        function stopTimer() {
            if (!state.isRunning) return;
            state.isRunning = false;
            // 止めた瞬間の経過時間を蓄積
            state.elapsedTime += (performance.now() - state.startTime);
            cancelAnimationFrame(animationFrameId);
            container.classList.remove('running');
            saveState();
        }

        function resetTimer() {
            state.isRunning = false;
            state.elapsedTime = 0;
            state.startTime = 0;
            cancelAnimationFrame(animationFrameId);
            container.classList.remove('running');
            displayTime(0);
            saveState();
        }

        function setPeriod(p) {
            state.period = p;
            statusDisplay.textContent = p;
            saveState();
        }

        // --- LocalStorageによる状態永続化・配信再接続対策 ---
        function saveState() {
            const data = {
                isRunning: state.isRunning,
                elapsedTime: state.elapsedTime,
                // 稼働中の場合は再接続時のズレを防ぐため、絶対時間(Unix Epoch Time)を記録
                savedAt: Date.now(),
                period: state.period,
                posX: state.posX,
                posY: state.posY,
                scale: state.scale
            };
            localStorage.setItem('soccer_timer_state', JSON.stringify(data));
        }

        function loadState() {
            const saved = localStorage.getItem('soccer_timer_state');
            if (!saved) return;
            try {
                const data = JSON.parse(saved);
                state.period = data.period || '前半';
                statusDisplay.textContent = state.period;
                
                state.posX = data.posX ?? 20;
                state.posY = data.posY ?? 20;
                state.scale = data.scale ?? 1;
                applyTransform();

                if (data.isRunning) {
                    // 配信が落ちていた時間（ギャップ）を計算して補正
                    const gap = Date.now() - data.savedAt;
                    state.elapsedTime = data.elapsedTime + gap;
                    state.isRunning = true;
                    state.startTime = performance.now();
                    container.classList.add('running');
                    updateTimer();
                } else {
                    state.elapsedTime = data.elapsedTime || 0;
                    displayTime(state.elapsedTime);
                }
            } catch (e) {
                console.error("State load error", e);
            }
        }

        // --- ボタンイベントアタッチ ---
        document.getElementById('btn-start').addEventListener('click', (e) => { e.stopPropagation(); startTimer(); });
        document.getElementById('btn-stop').addEventListener('click', (e) => { e.stopPropagation(); stopTimer(); });
        document.getElementById('btn-reset').addEventListener('click', (e) => { e.stopPropagation(); resetTimer(); });

        // タイマー部分のシングルタップでコントロールパネルの表示/非表示を切り替え
        let touchStartTime = 0;
        container.addEventListener('pointerdown', (e) => {
            touchStartTime = Date.now();
        });

        container.addEventListener('pointerup', (e) => {
            // ドラッグやピンチ操作と誤認しないよう、短いタップ(200ms未満)のみに反応
            if (Date.now() - touchStartTime < 200 && !isPinched && !isDragging) {
                controlPanel.classList.toggle('hidden');
            }
        });


        // --- ドラッグ移動 ＆ ピンチイン・アウト（マルチタッチ）の実装 ---
        let evCache = [];
        let prevDiff = -1;
        let isDragging = false;
        let isPinched = false;
        let startX, startY;

        function applyTransform() {
            container.style.transform = `translate3d(${state.posX}px, ${state.posY}px, 0) scale(${state.scale})`;
        }

        container.addEventListener('pointerdown', (e) => {
            evCache.push(e);
            if (evCache.length === 1) {
                // シングルタッチ時：ドラッグ準備
                isDragging = true;
                // スケール変更による座標ズレを考慮したポインタの原点取得
                startX = e.clientX - state.posX;
                startY = e.clientY - state.posY;
            }
        });

        container.addEventListener('pointermove', (e) => {
            // キャッシュされたイベントの更新
            const index = evCache.findIndex((ev) => ev.pointerId === e.pointerId);
            if (index > -1) evCache[index] = e;

            // ピンチズーム処理 (2本の指がタッチされている場合)
            if (evCache.length === 2) {
                isDragging = false;
                isPinched = true;
                
                // 2点間の現在の距離を計算
                const curDiff = Math.hypot(evCache[0].clientX - evCache[1].clientX, evCache[0].clientY - evCache[1].clientY);

                if (prevDiff > 0) {
                    // 変化量に応じてスケールを変更（感度調整: 0.005）
                    const delta = (curDiff - prevDiff) * 0.005;
                    state.scale = Math.max(0.5, Math.min(state.scale + delta, 3.0)); // 最小0.5倍〜最大3倍限制限
                    applyTransform();
                }
                prevDiff = curDiff;
            } 
            // ドラッグ移動処理 (1本の指で移動中かつピンチ中でない場合)
            else if (evCache.length === 1 && isDragging) {
                state.posX = e.clientX - startX;
                state.posY = e.clientY - startY;
                applyTransform();
            }
        });

        function handlePointerUp(e) {
            const index = evCache.findIndex((ev) => ev.pointerId === e.pointerId);
            if (index > -1) evCache.splice(index, 1);
            
            if (evCache.length < 2) {
                prevDiff = -1;
                if (evCache.length === 0) {
                    if (isDragging || isPinched) saveState();
                    isDragging = false;
                    setTimeout(() => isPinched = false, 100); // 判定リセットに僅かなバッファ
                }
            }
        }

        container.addEventListener('pointerup', handlePointerUp);
        container.addEventListener('pointercancel', handlePointerUp);
        container.addEventListener('pointerout', handlePointerUp);
        container.addEventListener('pointerleave', handlePointerUp);

        // 起動時に状態を復元
        window.addEventListener('DOMContentLoaded', loadState);
    </script>
</body>
</html>
