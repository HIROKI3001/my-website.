<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Soccer Broadcast Timer</title>

<style>
html,body{
    margin:0;
    padding:0;
    background:transparent;
    overflow:hidden;
    font-family:
    "Helvetica Neue",
    Arial,
    sans-serif;
}

/* ===== TIMER ===== */

#overlay{
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    z-index:9999;
    touch-action:none;
}

#timerBox{
    display:flex;
    align-items:center;
    gap:8px;

    background:rgba(0,0,0,.85);

    padding:6px 12px;

    border-radius:4px;

    cursor:move;

    user-select:none;
}

/* 時間表示 */

#time{
    color:#fff;

    font-weight:800;

    font-size:28px;

    letter-spacing:1px;

    text-shadow:
    0 0 2px #000,
    0 0 4px #000;
}

/* 前半後半表示 */

#period{
    background:#fff;

    color:#000;

    font-size:16px;

    font-weight:700;

    padding:4px 8px;

    border-radius:3px;

    min-width:50px;

    text-align:center;
}

/* ===== CONTROL PANEL ===== */

#controls{

    display:none;

    margin-top:8px;

    background:rgba(0,0,0,.95);

    padding:10px;

    border-radius:8px;

    width:max-content;
}

.btn{
    width:100px;
    height:48px;

    margin:4px;

    border:none;

    border-radius:8px;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;
}

.start{background:#00c853;color:#fff;}
.stop{background:#d50000;color:#fff;}
.reset{background:#455a64;color:#fff;}

.periodBtn{
    background:#1976d2;
    color:#fff;
}
</style>
</head>

<body>

<div id="overlay">

    <div id="timerBox">

        <div id="time">00:00:00</div>

        <div id="period">前半</div>

    </div>

    <div id="controls">

        <button class="btn start" id="startBtn">
            スタート
        </button>

        <button class="btn stop" id="stopBtn">
            ストップ
        </button>

        <button class="btn reset" id="resetBtn">
            リセット
        </button>

        <br>

        <button class="btn periodBtn" data-period="前半">
            前半
        </button>

        <button class="btn periodBtn" data-period="後半">
            後半
        </button>

        <button class="btn periodBtn" data-period="PK">
            PK
        </button>

    </div>

</div>

<script>

/* ==========================
   HIGH PRECISION TIMER
========================== */

const timeEl = document.getElementById("time");
const periodEl = document.getElementById("period");

let running=false;

let startPerf=0;
let elapsed=0;

/*
保存
*/

function saveState(){

    localStorage.setItem(
        "soccerTimer",
        JSON.stringify({
            running,
            elapsed,
            startPerf,
            period:periodEl.textContent,
            posX:overlay.style.left,
            posY:overlay.style.top
        })
    );
}

/*
復元
*/

(function(){

    const data=
    JSON.parse(
    localStorage.getItem("soccerTimer")
    );

    if(!data) return;

    elapsed=data.elapsed||0;

    periodEl.textContent=data.period||"前半";

    if(data.posX) overlay.style.left=data.posX;
    if(data.posY) overlay.style.top=data.posY;

    if(data.running){

        running=true;

        startPerf=
        performance.now()-elapsed;

    }

})();

/* ==========================
   TIMER LOOP
========================== */

function update(){

    if(running){

        elapsed=
        performance.now()-startPerf;

    }

    const totalSec=
    Math.floor(elapsed/1000);

    const h=
    String(Math.floor(totalSec/3600))
    .padStart(2,"0");

    const m=
    String(Math.floor(totalSec%3600/60))
    .padStart(2,"0");

    const s=
    String(totalSec%60)
    .padStart(2,"0");

    timeEl.textContent=
    `${h}:${m}:${s}`;

    requestAnimationFrame(update);
}

update();

/* ==========================
   BUTTONS
========================== */

document
.getElementById("startBtn")
.onclick=()=>{

    if(running) return;

    running=true;

    startPerf=
    performance.now()-elapsed;

    saveState();
};

document
.getElementById("stopBtn")
.onclick=()=>{

    running=false;

    saveState();
};

document
.getElementById("resetBtn")
.onclick=()=>{

    running=false;

    elapsed=0;

    timeEl.textContent=
    "00:00:00";

    saveState();
};

document
.querySelectorAll(".periodBtn")
.forEach(btn=>{

    btn.onclick=()=>{

        periodEl.textContent=
        btn.dataset.period;

        saveState();
    };

});

/* ==========================
   PANEL TOGGLE
========================== */

const controls=
document.getElementById("controls");

document
.getElementById("timerBox")
.addEventListener("click",()=>{

    controls.style.display=
    controls.style.display==="block"
    ? "none"
    : "block";

});

/* ==========================
   DRAG MOVE
========================== */

const overlay=
document.getElementById("overlay");

let dragging=false;
let offsetX=0;
let offsetY=0;

overlay.addEventListener("pointerdown",(e)=>{

    dragging=true;

    offsetX=
    e.clientX-overlay.offsetLeft;

    offsetY=
    e.clientY-overlay.offsetTop;

});

window.addEventListener("pointermove",(e)=>{

    if(!dragging) return;

    overlay.style.left=
    (e.clientX-offsetX)+"px";

    overlay.style.top=
    (e.clientY-offsetY)+"px";

    overlay.style.transform="none";
});

window.addEventListener("pointerup",()=>{

    dragging=false;

    saveState();

});

/* ==========================
   AUTO SAVE
========================== */

setInterval(saveState,5000);

</script>

</body>
</html>
